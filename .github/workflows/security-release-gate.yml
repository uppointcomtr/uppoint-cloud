name: Security Release Gate

on:
  pull_request:
    branches:
      - main
    paths:
      - "uppoint-cloud/**"
      - ".github/workflows/**"
  push:
    branches:
      - main
    paths:
      - "uppoint-cloud/**"
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-release-gate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  gate:
    name: Verify security gate
    runs-on: self-hosted
    timeout-minutes: 30
    defaults:
      run:
        working-directory: uppoint-cloud
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: uppoint-cloud/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify workflow layout
        run: npm run verify:workflow-layout

      - name: Verify repository/app root contract
        run: npm run verify:repo-layout

      - name: Prepare isolated build env for security gate
        run: |
          cat > .security-gate-build.env <<'EOF'
          DATABASE_URL=postgresql://ci:ci@localhost:5432/uppoint_cloud_ci
          NEXT_PUBLIC_APP_URL=${{ vars.E2E_BASE_URL || 'https://cloud.uppoint.com.tr' }}
          AUTH_SECRET=ci-auth-secret-0123456789abcdef0123456789
          AUTH_TRUST_HOST=true
          HEALTHCHECK_TOKEN=ci-healthcheck-token-0123456789
          AUTH_OTP_PEPPER=ci-otp-pepper-0123456789abcdef0123456789
          INTERNAL_AUDIT_TOKEN=ci-internal-audit-token-0123456789abcdef
          INTERNAL_DISPATCH_TOKEN=ci-internal-dispatch-token-0123456789ab
          INTERNAL_AUDIT_SIGNING_SECRET=ci-internal-audit-signing-0123456789abcdef
          INTERNAL_DISPATCH_SIGNING_SECRET=ci-internal-dispatch-signing-0123456789
          NOTIFICATION_PAYLOAD_SECRET=ci-notification-payload-secret-0123456789ab
          AUDIT_LOG_SIGNING_SECRET=ci-audit-log-signing-secret-0123456789abcd
          AUDIT_ANCHOR_SIGNING_SECRET=ci-audit-anchor-signing-secret-0123456789ab
          RATE_LIMIT_REDIS_URL=redis://localhost:6379
          UPPOINT_EMAIL_BACKEND=smtp
          UPPOINT_DEFAULT_FROM_EMAIL='Uppoint Cloud <noreply@cloud.uppoint.com.tr>'
          UPPOINT_EMAIL_HOST=smtp.example.local
          UPPOINT_EMAIL_PORT=587
          UPPOINT_EMAIL_HOST_USER=ci-user
          UPPOINT_EMAIL_HOST_PASSWORD=ci-password
          UPPOINT_EMAIL_USE_TLS=true
          UPPOINT_SMS_ENABLED=true
          UPPOINT_SMS_API_URL=https://sms.example.local/send
          UPPOINT_SMS_USERNAME=ci-sms-user
          UPPOINT_SMS_PASSWORD=ci-sms-password
          UPPOINT_SMS_SOURCE_ADDR=UPPOINT
          EOF

      - name: Run canonical security gate
        env:
          SECURITY_GATE_BUILD_ENV_FILE: .security-gate-build.env
        run: npm run verify:security-gate

  remote-smoke:
    name: Remote auth smoke (release gate)
    if: github.event_name != 'pull_request'
    needs: gate
    runs-on: self-hosted
    timeout-minutes: 20
    env:
      E2E_BASE_URL: ${{ vars.E2E_BASE_URL || 'https://cloud.uppoint.com.tr' }}
      E2E_HEALTHCHECK_TOKEN: ${{ secrets.E2E_HEALTHCHECK_TOKEN }}
      E2E_ALLOW_MUTATIONS: "0"
      E2E_ENFORCE_HEALTH_200: "1"
    defaults:
      run:
        working-directory: uppoint-cloud
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: uppoint-cloud/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Require healthcheck token for production target
        run: |
          set -euo pipefail
          target="$(printf '%s' "${E2E_BASE_URL}" | tr '[:upper:]' '[:lower:]')"
          if [ "${target}" = "https://cloud.uppoint.com.tr" ] && [ -z "${E2E_HEALTHCHECK_TOKEN:-}" ]; then
            echo "E2E_HEALTHCHECK_TOKEN is required for production remote smoke runs."
            exit 1
          fi

      - name: Run remote smoke suite
        run: npm run test:e2e:remote
