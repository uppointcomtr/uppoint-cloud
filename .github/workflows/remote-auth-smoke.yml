name: Remote Auth Smoke

on:
  schedule:
    # Nightly run at 00:15 UTC (03:15 Europe/Istanbul)
    - cron: "15 0 * * *"
  workflow_dispatch:
    inputs:
      base_url:
        description: "Remote base URL (e.g. https://cloud.uppoint.com.tr)"
        required: false
        default: "https://cloud.uppoint.com.tr"
      allow_mutations:
        description: "Run mutating smoke cases (use only on isolated non-production env)"
        required: false
      enforce_health_200:
        description: "Fail workflow when /api/health final status is not 200 (0/1)"
        required: false

permissions:
  contents: read

concurrency:
  group: remote-auth-smoke
  cancel-in-progress: false

jobs:
  smoke:
    name: Remote auth smoke (nightly)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      E2E_BASE_URL: ${{ inputs.base_url || vars.E2E_BASE_URL || 'https://cloud.uppoint.com.tr' }}
      E2E_HEALTHCHECK_TOKEN: ${{ secrets.E2E_HEALTHCHECK_TOKEN }}
      E2E_ALLOW_MUTATIONS: ${{ inputs.allow_mutations || vars.E2E_ALLOW_MUTATIONS || '0' }}
      E2E_ENFORCE_HEALTH_200: ${{ inputs.enforce_health_200 || vars.E2E_ENFORCE_HEALTH_200 || '0' }}
    defaults:
      run:
        working-directory: uppoint-cloud
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Capture run timing baseline
        id: timing
        run: echo "start_epoch=$(date -u +%s)" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: uppoint-cloud/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run remote smoke suite
        run: npm run test:e2e:remote

      - name: Probe health endpoint
        id: health
        if: always()
        run: |
          set +e
          health_url="${E2E_BASE_URL%/}/api/health"
          initial_code="$(curl -sS -o /tmp/remote-auth-health.json -w '%{http_code}' "${health_url}")"
          final_code="${initial_code}"
          auth_mode="direct"

          if [ "${initial_code}" = "401" ] && [ -n "${E2E_HEALTHCHECK_TOKEN:-}" ]; then
            auth_mode="token"
            final_code="$(curl -sS -o /tmp/remote-auth-health.json -w '%{http_code}' -H "x-health-token: ${E2E_HEALTHCHECK_TOKEN}" "${health_url}")"
          fi

          rm -f /tmp/remote-auth-health.json

          if [ "${initial_code}" = "401" ] && [ -z "${E2E_HEALTHCHECK_TOKEN:-}" ]; then
            health_result="401 (token required, token missing)"
          elif [ "${final_code}" = "200" ] && [ "${auth_mode}" = "token" ]; then
            health_result="200 (token auth)"
          elif [ "${final_code}" = "200" ]; then
            health_result="200"
          elif [ "${final_code}" = "000" ]; then
            health_result="network_error"
          else
            health_result="${final_code}"
          fi

          echo "health_result=${health_result}" >> "${GITHUB_OUTPUT}"
          echo "initial_code=${initial_code}" >> "${GITHUB_OUTPUT}"
          echo "final_code=${final_code}" >> "${GITHUB_OUTPUT}"
          echo "Health endpoint probe result: ${health_result} (initial=${initial_code}, final=${final_code})"

      - name: Enforce health endpoint policy
        if: always()
        env:
          ENFORCE_HEALTH_200: ${{ env.E2E_ENFORCE_HEALTH_200 }}
          HEALTH_FINAL_CODE: ${{ steps.health.outputs.final_code }}
        run: |
          set -euo pipefail

          enforce="0"
          case "${ENFORCE_HEALTH_200}" in
            1|true|TRUE|yes|YES)
              enforce="1"
              ;;
          esac

          if [ "${enforce}" = "1" ] && [ "${HEALTH_FINAL_CODE:-}" != "200" ]; then
            echo "Health guard failed: final_code=${HEALTH_FINAL_CODE:-unknown}"
            exit 1
          fi

          echo "Health guard passed: enforce=${enforce}, final_code=${HEALTH_FINAL_CODE:-unknown}"

      - name: Write CI summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          START_EPOCH: ${{ steps.timing.outputs.start_epoch }}
          HEALTH_RESULT: ${{ steps.health.outputs.health_result }}
          HEALTH_GUARD: ${{ env.E2E_ENFORCE_HEALTH_200 }}
        run: |
          set -euo pipefail
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          end_epoch="$(date -u +%s)"
          start_epoch="${START_EPOCH:-$end_epoch}"
          if ! [[ "${start_epoch}" =~ ^[0-9]+$ ]]; then
            start_epoch="${end_epoch}"
          fi
          duration_sec="$((end_epoch - start_epoch))"
          duration_hms="$(printf '%02d:%02d:%02d' "$((duration_sec / 3600))" "$(((duration_sec % 3600) / 60))" "$((duration_sec % 60))")"

          if [ -n "${E2E_HEALTHCHECK_TOKEN:-}" ]; then
            health_token_state="configured"
          else
            health_token_state="missing"
          fi

          {
            echo "## Remote Auth Smoke Summary"
            echo "- Run URL: ${run_url}"
            echo "- Result: ${JOB_STATUS}"
            echo "- Duration: ${duration_hms} (${duration_sec}s)"
            echo "- Base URL: ${E2E_BASE_URL}"
            echo "- Mutations enabled: ${E2E_ALLOW_MUTATIONS}"
            echo "- E2E_HEALTHCHECK_TOKEN: ${health_token_state}"
            echo "- Health endpoint: ${HEALTH_RESULT:-unknown}"
            echo "- Health guard: ${HEALTH_GUARD}"
          } >> "${GITHUB_STEP_SUMMARY}"
