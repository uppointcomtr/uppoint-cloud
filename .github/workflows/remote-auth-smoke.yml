name: Remote Auth Smoke

on:
  schedule:
    # Nightly run at 00:15 UTC (03:15 Europe/Istanbul)
    - cron: "15 0 * * *"
  workflow_dispatch:
    inputs:
      base_url:
        description: "Remote base URL (e.g. https://cloud.uppoint.com.tr)"
        required: false
        default: "https://cloud.uppoint.com.tr"
      allow_mutations:
        description: "Run mutating smoke cases (use only on isolated non-production env)"
        required: false
        default: "0"

permissions:
  contents: read

concurrency:
  group: remote-auth-smoke
  cancel-in-progress: false

jobs:
  smoke:
    name: Remote auth smoke (nightly)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      E2E_BASE_URL: ${{ inputs.base_url || vars.E2E_BASE_URL || 'https://cloud.uppoint.com.tr' }}
      E2E_HEALTHCHECK_TOKEN: ${{ secrets.E2E_HEALTHCHECK_TOKEN }}
      E2E_ALLOW_MUTATIONS: ${{ inputs.allow_mutations || '0' }}
    defaults:
      run:
        working-directory: uppoint-cloud
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Capture run timing baseline
        id: timing
        run: echo "start_epoch=$(date -u +%s)" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: uppoint-cloud/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run remote smoke suite
        run: npm run test:e2e:remote

      - name: Write CI summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          START_EPOCH: ${{ steps.timing.outputs.start_epoch }}
        run: |
          set -euo pipefail
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          end_epoch="$(date -u +%s)"
          start_epoch="${START_EPOCH:-$end_epoch}"
          if ! [[ "${start_epoch}" =~ ^[0-9]+$ ]]; then
            start_epoch="${end_epoch}"
          fi
          duration_sec="$((end_epoch - start_epoch))"
          duration_hms="$(printf '%02d:%02d:%02d' "$((duration_sec / 3600))" "$(((duration_sec % 3600) / 60))" "$((duration_sec % 60))")"

          if [ -n "${E2E_HEALTHCHECK_TOKEN:-}" ]; then
            health_token_state="configured"
          else
            health_token_state="missing"
          fi

          {
            echo "## Remote Auth Smoke Summary"
            echo "- Run URL: ${run_url}"
            echo "- Result: ${JOB_STATUS}"
            echo "- Duration: ${duration_hms} (${duration_sec}s)"
            echo "- Base URL: ${E2E_BASE_URL}"
            echo "- Mutations enabled: ${E2E_ALLOW_MUTATIONS}"
            echo "- E2E_HEALTHCHECK_TOKEN: ${health_token_state}"
          } >> "${GITHUB_STEP_SUMMARY}"
