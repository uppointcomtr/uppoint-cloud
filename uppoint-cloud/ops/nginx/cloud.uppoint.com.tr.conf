server {
    listen 80;
    listen [::]:80;
    server_name cloud.uppoint.com.tr;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name cloud.uppoint.com.tr;

    ssl_certificate /etc/letsencrypt/live/cloud.uppoint.com.tr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cloud.uppoint.com.tr/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;

    # --- Security headers ---
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header X-Request-Id $request_id always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; form-action 'self'; object-src 'none'; frame-ancestors 'none'; frame-src 'none'; script-src 'self' 'nonce-$request_id' 'strict-dynamic'; style-src 'self' 'nonce-$request_id'; font-src 'self' data:; img-src 'self' data: blob:; connect-src 'self'; worker-src 'self' blob:; manifest-src 'self'; upgrade-insecure-requests;" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;

    # Inject request nonce into all script tags so inline Next.js scripts satisfy CSP.
    sub_filter_once off;
    sub_filter '<script' '<script nonce="$request_id"';
    sub_filter '<style' '<style nonce="$request_id"';

    # --- Gzip compression ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    client_max_body_size 10m;
    client_body_buffer_size 128k;

    # --- Proxy buffer ---
    proxy_buffer_size   16k;
    proxy_buffers       16 16k;
    proxy_busy_buffers_size 32k;

    # --- Auth API edge rate limiting ---
    # Second layer on top of app-level limits to absorb bursts before Node.js.
    limit_req_log_level warn;
    limit_req_status 429;

    # --- Local health probe endpoint ---
    # This endpoint is intended for local monitoring only.
    # Token header is injected via external snippet generated from .env:
    # /etc/nginx/snippets/uppoint-health-token.conf
    location = /healthz {
        allow 127.0.0.1;
        allow ::1;
        deny all;

        include /etc/nginx/snippets/uppoint-health-token.conf;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Request-Id $request_id;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 15s;
        proxy_pass http://127.0.0.1:3000/api/health;
        access_log off;
    }

    location ^~ /api/auth/ {
        limit_req zone=uppoint_auth_per_ip burst=17 nodelay;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Request-Id $request_id;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
        proxy_pass http://127.0.0.1:3000;
    }

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Request-Id $request_id;
        proxy_set_header Accept-Encoding "";
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
        proxy_pass http://127.0.0.1:3000;
    }
}
