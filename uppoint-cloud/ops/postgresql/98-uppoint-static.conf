# Uppoint Cloud — static safety timeouts
# Bu dosya otomatik tune'dan bağımsızdır; değişmez.
# Uygula: sudo cp ops/postgresql/98-uppoint-static.conf /etc/postgresql/17/main/conf.d/
#          sudo systemctl reload postgresql

# Uzun sorguları öldür (DoS / ORM bug koruması)
statement_timeout                    = '30s'

# Açık transaction'da bekleyen idle bağlantıları kapat
idle_in_transaction_session_timeout  = '30s'

# DDL deadlock'larını erken kır
lock_timeout                         = '10s'
