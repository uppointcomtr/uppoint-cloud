# Uppoint Cloud Redis hardening
# Auth rate-limit keys are ephemeral (expire set), so volatile-ttl keeps memory bounded
# while preferring eviction of near-expiry keys under pressure.
appendonly yes
appendfsync everysec

# Redis memory limit is independent from app/systemd limits.
maxmemory 256mb
maxmemory-policy volatile-ttl

# Reduce sync write pressure during heavy eviction.
lazyfree-lazy-eviction yes
